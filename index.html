<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catálogo de Películas</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #09090b;
        min-height: 100vh;
        padding: 40px;
        font-family: Arial, sans-serif;
        color: #ddd;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 40px;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo-dot {
        width: 10px;
        height: 10px;
        background: #a78bfa;
        border-radius: 50%;
      }

      .logo-text {
        color: #fff;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.5px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 40px;
      }

      .stat {
        background: #111113;
        border: 0.5px solid #222;
        border-radius: 16px;
        padding: 20px 24px;
        border-top: 2px solid #a78bfa;
      }

      .stat-label {
        color: #666;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 10px;
      }

      .stat-value {
        color: #fff;
        font-size: 32px;
        font-weight: 700;
        letter-spacing: -1px;
      }

      .section-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }

      .section-header h2 {
        color: #fff;
        font-size: 15px;
        font-weight: 600;
      }

      .pill-count {
        background: #1c1c1f;
        color: #888;
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 20px;
        border: 0.5px solid #333;
      }

      .table-wrap {
        background: #111113;
        border: 0.5px solid #1e1e22;
        border-radius: 16px;
        overflow: hidden;
        margin-bottom: 40px;
      }

      table { width: 100%; border-collapse: collapse; }

      thead tr { background: #0d0d10; }

      th {
        color: #444;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 14px 24px;
        text-align: left;
        font-weight: 500;
      }

      td {
        padding: 16px 24px;
        font-size: 14px;
        border-top: 0.5px solid #1a1a1e;
      }

      tbody tr:hover { background: #141418; }

      .title-cell { color: #fff; font-weight: 500; }
      .year-cell { color: #555; font-size: 13px; }
      .id-cell { color: #555; }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 12px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 500;
      }

      .director-pill {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .avatar {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        background: #1e1e2e;
        border: 0.5px solid #333;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 700;
        color: #a78bfa;
        flex-shrink: 0;
      }

      .form-card {
        background: #111113;
        border: 0.5px solid #1e1e22;
        border-radius: 16px;
        padding: 28px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 20px;
      }

      .field label {
        display: block;
        color: #555;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 8px;
      }

      .field input, .field select {
        width: 100%;
        background: #09090b;
        border: 0.5px solid #2a2a2e;
        border-radius: 10px;
        padding: 12px 16px;
        color: #fff;
        font-size: 14px;
        appearance: none;
        -webkit-appearance: none;
      }

      .field input::placeholder { color: #333; }

      .field input:focus, .field select:focus {
        outline: none;
        border-color: #a78bfa;
      }

      .select-wrap {
        position: relative;
      }

      .select-wrap::after {
        content: '▾';
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: #555;
        pointer-events: none;
        font-size: 13px;
      }

      .btn {
        background: #a78bfa;
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 14px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
      }

      .btn:hover { background: #9333ea; }
    </style>
  </head>
  <body>

    <div class="topbar">
      <div class="logo">
        <div class="logo-dot"></div>
        <span class="logo-text">Catálogo de Películas</span>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Total películas</div>
        <div class="stat-value" id="total-peliculas">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Directores</div>
        <div class="stat-value">3</div>
      </div>
      <div class="stat">
        <div class="stat-label">Géneros</div>
        <div class="stat-value" id="total-generos">0</div>
      </div>
    </div>

    <div class="section-header">
      <h2>Películas</h2>
      <span class="pill-count" id="pill-count">0 resultados</span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Título</th>
            <th>Año</th>
            <th>Género</th>
            <th>Director</th>
          </tr>
        </thead>
        <tbody id="lista-peliculas"></tbody>
      </table>
    </div>

    <div class="section-header">
      <h2>Agregar película</h2>
    </div>

    <div class="form-card">
      <form id="form-agregar">
        <div class="form-grid">
          <div class="field">
            <label>Título</label>
            <input type="text" id="titulo" placeholder="Ej: The Dark Knight" required />
          </div>
          <div class="field">
            <label>Año</label>
            <input type="number" id="anio" placeholder="Ej: 2008" required />
          </div>
          <div class="field">
            <label>Género</label>
            <input type="text" id="genero" placeholder="Ej: Acción" required />
          </div>
          <div class="field">
            <label>Director</label>
            <div class="select-wrap">
              <select id="directorId">
                <option value="1">Christopher Nolan</option>
                <option value="2">Francis Ford Coppola</option>
                <option value="3">Bong Joon-ho</option>
              </select>
            </div>
          </div>
        </div>
        <button type="submit" class="btn">Agregar película</button>
      </form>
    </div>

    <script src="app.js"></script>
  </body>
</html>
